# yaml-language-server: $schema=https://schema.buildwithfern.dev/docs-yml.json

instances:
  - url: harry-potter-api.docs.buildwithfern.com
    edit-this-page:
      github:
        owner: fern-starter
        repo: performance-motors-co-214106
        branch: main
      launch: dashboard
title: harry-potter-api | Documentation
layout:
  searchbar-placement: header
  page-width: full
navigation:
  - api: Harry Potter API - With magic visualizations
    flattened: true
    layout:
      - page: Introduction
        path: docs/pages/introduction.mdx
colors:
  accent-primary:
    light: "#008700"
    dark: "#008700"
  background:
    light: "#FFFFFF"
    dark: "#111113"
  border:
    light: "#E5E7EB"
    dark: "#222325"
theme:
  page-actions: toolbar
  footer-nav: minimal
logo:
  dark: docs/assets/logo-dark.svg
  light: docs/assets/logo.svg
  height: 20
  href: https://buildwithfern.com
favicon: docs/assets/favicon.svg
css:
  - styles.css
  - docs/assets/onboarding-theme.css
typography:
  headingsFont:
    name: Inter
  bodyFont:
    name: Inter
ai-search: {}
